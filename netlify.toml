# ============================================================
# Angie Putman Artistry — Netlify Configuration
# ============================================================

[build]
  publish = "."

# Headers for performance and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect old GitHub Pages URL if needed
[[redirects]]
  from = "https://alexandrajensen.github.io/angie-putman-brandkit/*"
  to = "https://putmanartistry.com/:splat"
  status = 301
  force = true

# SPA fallback (not strictly needed for single page, but good practice)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Netlify Forms
[build.processing.html]
  pretty_urls = false
